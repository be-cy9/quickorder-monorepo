services:
  # ============================================
  # BASE DE DATOS MYSQL
  # ============================================
  mysql_db:
    image: mysql:8.0
    container_name: quickorder_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ============================================
  # MICROSERVICIOS
  # ============================================
  ms-pedidos:
    build:
      context: ./ms-pedidos
      dockerfile: Dockerfile
    container_name: ms-pedidos
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_pedidos?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-clientes:
    build:
      context: ./ms-clientes
      dockerfile: Dockerfile
    container_name: ms-clientes
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_clientes?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-inventario:
    build:
      context: ./ms-inventario
      dockerfile: Dockerfile
    container_name: ms-inventario
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_inventario?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-pagos:
    build:
      context: ./ms-pagos
      dockerfile: Dockerfile
    container_name: ms-pagos
    ports:
      - "8084:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_pagos?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    ports:
      - "8086:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_notificaciones?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-facturacion:
    build:
      context: ./ms-facturacion
      dockerfile: Dockerfile
    container_name: ms-facturacion
    ports:
      - "8087:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_facturacion?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-envios:
    build:
      context: ./ms-envios
      dockerfile: Dockerfile
    container_name: ms-envios
    ports:
      - "8088:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_envios?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-soporte:
    build:
      context: ./ms-soporte
      dockerfile: Dockerfile
    container_name: ms-soporte
    ports:
      - "8089:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_soporte?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-reportes:
    build:
      context: ./ms-reportes
      dockerfile: Dockerfile
    container_name: ms-reportes
    ports:
      - "8090:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_reportes?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  ms-seguridad:
    build:
      context: ./ms-seguridad
      dockerfile: Dockerfile
    container_name: ms-seguridad
    ports:
      - "8091:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/db_seguridad?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysql_db:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID=ms-pedidos
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI=http://ms-pedidos:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0=Path=/api/pedidos/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID=ms-clientes
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI=http://ms-clientes:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0=Path=/api/clientes/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID=ms-inventario
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI=http://ms-inventario:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0=Path=/api/productos/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_ID=ms-pagos
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_URI=http://ms-pagos:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_PREDICATES_0=Path=/api/pagos/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_ID=ms-notificaciones
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_URI=http://ms-notificaciones:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_PREDICATES_0=Path=/api/notificaciones/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_ID=ms-facturacion
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_URI=http://ms-facturacion:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_PREDICATES_0=Path=/api/facturas/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_6_ID=ms-envios
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_6_URI=http://ms-envios:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_6_PREDICATES_0=Path=/api/envios/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_7_ID=ms-soporte
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_7_URI=http://ms-soporte:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_7_PREDICATES_0=Path=/api/tickets/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_8_ID=ms-reportes
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_8_URI=http://ms-reportes:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_8_PREDICATES_0=Path=/api/reportes/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_9_ID=ms-seguridad
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_9_URI=http://ms-seguridad:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_9_PREDICATES_0=Path=/api/usuarios/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_10_ID=ms-seguridad-auth
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_10_URI=http://ms-seguridad:8080
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_10_PREDICATES_0=Path=/auth/**
    depends_on:
      - ms-pedidos
      - ms-clientes
      - ms-inventario
      - ms-pagos
      - ms-notificaciones
      - ms-facturacion
      - ms-envios
      - ms-soporte
      - ms-reportes
      - ms-seguridad

volumes:
  mysql_data: