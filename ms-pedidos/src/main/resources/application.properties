spring.application.name=ms-pedidos
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3307/db_pedidos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway gestiona el esquema → Hibernate solo valida, no toca la BD
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway configuración
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

logging.level.com.duoc.quickorder=DEBUG
logging.level.org.springframework.web=INFO

# Configuración de logs a archivo (para trazabilidad en defensa)
logging.file.name=logs/ms-pedidos.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret.key=MiClaveSuperSecretaPara10Microservicios2024!
jwt.expiration.time=900000

# Fix para compatibilidad de Swagger con HATEOAS en Spring Boot 3.5
springdoc.show-hateoas=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration