spring.application.name=ms-pedidos
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3307/db_pedidos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CAMBIAR validate POR update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# COMENTAR o ELIMINAR estas líneas (poner # al inicio)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true

logging.level.com.duoc.quickorder=DEBUG

# JWT Configuration
jwt.secret.key=MiClaveSuperSecretaPara10Microservicios2024!
jwt.expiration.time=900000

# Fix para compatibilidad de Swagger con HATEOAS en Spring Boot 3.5
springdoc.show-hateoas=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration