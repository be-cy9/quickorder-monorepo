server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: ms-pedidos
              uri: http://localhost:8081
              predicates:
                - Path=/api/pedidos/**
            - id: ms-clientes
              uri: http://localhost:8082
              predicates:
                - Path=/api/clientes/**
            - id: ms-inventario
              uri: http://localhost:8083
              predicates:
                - Path=/api/productos/**
            - id: ms-pagos
              uri: http://localhost:8084
              predicates:
                - Path=/api/pagos/**
            - id: ms-notificaciones
              uri: http://localhost:8086
              predicates:
                - Path=/api/notificaciones/**
            - id: ms-facturacion
              uri: http://localhost:8087
              predicates:
                - Path=/api/facturas/**
            - id: ms-envios
              uri: http://localhost:8088
              predicates:
                - Path=/api/envios/**
            - id: ms-soporte
              uri: http://localhost:8089
              predicates:
                - Path=/api/tickets/**
            - id: ms-reportes
              uri: http://localhost:8090
              predicates:
                - Path=/api/reportes/**
            - id: ms-seguridad
              uri: http://localhost:8091
              predicates:
                - Path=/api/usuarios/**
            - id: ms-seguridad-auth
              uri: http://localhost:8091
              predicates:
                - Path=/auth/**
